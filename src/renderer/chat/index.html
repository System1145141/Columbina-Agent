<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Columbina · 聊天</title>
  <link rel="stylesheet" href="../ui/tokens.css" />
  <link rel="stylesheet" href="../ui/fonts.css" />
  <link rel="stylesheet" href="../ui/base.css" />
  <link rel="stylesheet" href="./chat.css" />
</head>
<body>
  <div class="chat">
    <canvas class="chat__particles" id="particles" aria-hidden="true"></canvas>
    <div class="chat__body">
      <aside class="chat__rail" id="chat-rail" hidden>
        <button type="button" class="chat__rail-new" id="chat-rail-new">
          <span class="chat__rail-new-icon" aria-hidden="true">＋</span>
          <span data-i18n="chatWindow.newChat">新对话</span>
        </button>
        <ul class="chat__rail-list" id="chat-rail-list" role="list"></ul>
        <div class="chat__rail-empty is-hidden" id="chat-rail-empty">
          <span aria-hidden="true">📭</span>
          <p data-i18n="chatWindow.noConversations">还没有对话</p>
        </div>
      </aside>
      <div class="chat__main">
        <header class="chat__titlebar">
          <div class="chat__titlebar-drag">
            <button type="button" class="chat__status-btn" id="chat-status-btn" aria-label="会话列表" title="会话列表" data-i18n-aria="chatWindow.sessionList">
              <div class="loader">
                <svg width="100" height="100" viewBox="0 0 100 100">
                  <defs>
                    <mask id="clipping">
                      <polygon points="0,0 100,0 100,100 0,100" fill="black"></polygon>
                      <polygon points="25,25 75,25 50,75" fill="white"></polygon>
                      <polygon points="50,25 75,75 25,75" fill="white"></polygon>
                      <polygon points="35,35 65,35 50,65" fill="white"></polygon>
                      <polygon points="35,35 65,35 50,65" fill="white"></polygon>
                      <polygon points="35,35 65,35 50,65" fill="white"></polygon>
                      <polygon points="35,35 65,35 50,65" fill="white"></polygon>
                    </mask>
                  </defs>
                </svg>
                <div class="box"></div>
              </div>
            </button>
            <span class="chat__role-selector" id="role-selector">
              <span class="chat__role-group" id="role-left">
                <span class="chat__role-name" id="role-name-left">哥伦比娅</span>
                <select class="chat__role-model-select" id="role-model-left" aria-label="哥伦比娅的模型" data-i18n-aria="chatWindow.columbinaModel"></select>
              </span>
              <label class="chat__role-switch" id="role-toggle-label">
                <input type="checkbox" id="role-toggle" aria-label="切换角色" data-i18n-aria="chatWindow.switchRole" />
                <span class="chat__role-slider"></span>
              </label>
              <span class="chat__role-group" id="role-right">
                <select class="chat__role-model-select" id="role-model-right" aria-label="桑多涅的模型" data-i18n-aria="chatWindow.sandroneModel"></select>
                <span class="chat__role-name" id="role-name-right">桑多涅</span>
              </span>
            </span>
          </div>
          <div class="chat__titlebar-actions">
            <div class="dropdown-trigger" data-dropdown="mode-dropdown">
              <span class="dt-label" data-i18n="chatWindow.mode">模式</span>
              <span class="dt-value" id="mode-val" data-i18n="chatWindow.modeCollab">协作</span>
              <span class="dt-arrow"></span>
            </div>
            <div class="dropdown-trigger" data-dropdown="style-dropdown">
              <span class="dt-label" data-i18n="chatWindow.style">风格</span>
              <span class="dt-value" id="style-val" data-i18n="chatWindow.styleGentle">温柔 · 和善</span>
              <span class="dt-arrow"></span>
            </div>
            <div class="dropdown-trigger" data-dropdown="reasoning-dropdown">
              <span class="dt-label" data-i18n="chatWindow.reasoning">推理</span>
              <span class="dt-value" id="reasoning-val">Auto · 自动</span>
              <span class="dt-arrow"></span>
            </div>
            <button type="button" class="chat__icon-btn" id="clear" aria-label="清空对话" title="清空对话" data-i18n-aria="chatWindow.clearChat" data-i18n-title="chatWindow.clearChat">⌫</button>
            <button type="button" class="chat__winbtn" id="min-btn" aria-label="最小化" title="最小化" data-i18n-aria="window.minimize" data-i18n-title="window.minimize">
              <svg width="10" height="2" viewBox="0 0 10 2" aria-hidden="true"><rect width="10" height="2" rx="1" fill="currentColor"/></svg>
            </button>
            <button type="button" class="chat__winbtn" id="max-btn" aria-label="最大化" title="最大化" data-i18n-aria="window.maximize" data-i18n-title="window.maximize">
              <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><rect x="0.75" y="0.75" width="8.5" height="8.5" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
            <button type="button" class="chat__winbtn chat__winbtn--close" id="close-btn" aria-label="关闭" title="关闭" data-i18n-aria="window.close" data-i18n-title="window.close">
              <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
                <line x1="2" y1="2" x2="8" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="8" y1="2" x2="2" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </header>
        <main class="chat__messages" id="messages" aria-live="polite"></main>
        <div class="chat__empty-state" id="chat-empty" hidden>
          <div class="chat__empty-icon">💬</div>
          <p class="chat__empty-text" id="chat-empty-text"><span data-i18n="chatWindow.emptyTextCol">哥伦比娅期待与你聊天哦</span> ✨</p>
          <div class="chat__quick-presets" id="quick-presets"></div>
        </div>
      </div>
    </div>
    <div class="chat__file-tags" id="file-tags"></div>
    <form class="chat__input" id="composer">
      <input type="file" id="file-input" accept=".txt,.md,.json,.csv,.log" multiple style="display:none" />
      <button type="button" class="chat__attach" id="attach-btn" aria-label="上传文件" title="上传文件" data-i18n-aria="chatWindow.uploadFile" data-i18n-title="chatWindow.uploadFile">📎</button>
      <button type="button" class="chat__sticker-btn" id="sticker-picker-btn" aria-label="表情包" title="表情包" data-i18n-aria="chatWindow.sticker" data-i18n-title="chatWindow.sticker">😀</button>
      <textarea
        id="input"
        rows="1"
        placeholder="说点什么…  Enter 发送 / Shift+Enter 换行"
        autocomplete="off"
        spellcheck="false"
        data-i18n-placeholder="chatWindow.placeholder"
      ></textarea>
      <button type="submit" class="chat__send" id="send" aria-label="发送" data-i18n-aria="chatWindow.send">↵</button>
    </form>
    <div class="sticker-picker" id="sticker-picker" hidden>
      <div class="sticker-picker__grid" id="sticker-picker-grid"></div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
  <div class="dropdown-menu" id="mode-dropdown">
    <div class="dm-opt is-active" data-value="collab">🛠️ <span data-i18n="chatWindow.modeCollab">协作</span></div>
    <div class="dm-opt" data-value="talk">💬 <span data-i18n="chatWindow.modeTalk">日常聊天</span></div>
  </div>
  <div class="dropdown-menu" id="style-dropdown">
    <div class="dm-title" data-i18n="chatWindow.styleTitle">聊天风格</div>
    <div class="dm-opt is-active" data-value="01_default.md">🌸 <span data-i18n="chatWindow.styleGentle">温柔 · 和善</span></div>
    <div class="dm-opt" data-value="02_lively.md">✨ <span data-i18n="chatWindow.styleLively">元气 · 活泼</span></div>
    <div class="dm-opt" data-value="03_healing.md">🌿 <span data-i18n="chatWindow.styleHealing">治愈 · 安心</span></div>
    <div class="dm-opt" data-value="04_focused.md">📖 <span data-i18n="chatWindow.styleFocused">知性 · 认真</span></div>
    <div class="dm-opt" data-value="05_sweet.md">💕 <span data-i18n="chatWindow.styleSweet">撒娇 · 黏人</span></div>
  </div>
  <div class="dropdown-menu" id="reasoning-dropdown">
    <div class="dm-title" data-i18n="chatWindow.reasoningTitle">推理强度</div>
    <div class="dm-opt" data-value="Custom · 自定义">Custom · 自定义</div>
    <div class="dm-opt is-active" data-value="Auto · 自动">Auto · 自动</div>
    <div class="dm-opt" data-value="Low · 低">Low · 低</div>
    <div class="dm-opt" data-value="Medium · 中">Medium · 中</div>
    <div class="dm-opt" data-value="High · 高">High · 高</div>
  </div>
</body>
</html>
