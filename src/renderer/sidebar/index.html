<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Columbina · 状态</title>
  <link rel="stylesheet" href="../ui/tokens.css" />
  <link rel="stylesheet" href="../ui/fonts.css" />
  <link rel="stylesheet" href="../ui/base.css" />
  <link rel="stylesheet" href="./sidebar.css" />
</head>
<body>
  <div class="sidebar">
    <header class="sidebar__titlebar">
      <button type="button" class="sidebar__icon-btn" id="pin-btn" aria-label="置顶" title="置顶" data-i18n-aria="sidebar.pin" data-i18n-title="sidebar.pin">📌</button>
      <div class="sidebar__title">
        <span class="sidebar__name">Columbina</span>
        <span class="sidebar__hint" data-i18n="sidebar.statusPanel">状态面板</span>
      </div>
      <div class="sidebar__titlebar-actions">
        <button type="button" class="sidebar__winbtn" id="min-btn" aria-label="最小化" title="最小化" data-i18n-aria="window.minimize" data-i18n-title="window.minimize">
          <svg width="9" height="2" viewBox="0 0 9 2" aria-hidden="true"><rect width="9" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <button type="button" class="sidebar__winbtn sidebar__winbtn--close" id="close-btn" aria-label="关闭" title="关闭" data-i18n-aria="window.close" data-i18n-title="window.close">
          <svg width="9" height="9" viewBox="0 0 9 9" aria-hidden="true">
            <line x1="2" y1="2" x2="7" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="7" y1="2" x2="2" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="sidebar__body">
      <section class="profile">
        <img class="profile__avatar" src="/avatars/Columbina.jpg" alt="Columbina" draggable="false" />
        <div class="profile__name">Columbina</div>
        <div class="profile__online">
          <span class="profile__dot" aria-hidden="true"></span>
          <span id="online-status-label" data-i18n="sidebar.online">在线</span>
        </div>
      </section>

      <hr class="sidebar__divider" />

      <section class="panel-card panel-card--status">
        <div class="indicator">
          <div class="indicator__emoji" id="status-emoji">✨</div>
          <div class="indicator__text">
            <span class="indicator__prefix" data-i18n="sidebar.statusPrefix">状态：</span>
            <span class="indicator__label" id="status-label">元气</span>
          </div>
        </div>
      </section>

      <section class="panel-card panel-card--feeling">
        <div class="indicator">
          <div class="indicator__emoji" id="feeling-emoji">🥰</div>
          <div class="indicator__text">
            <span class="indicator__prefix" data-i18n="sidebar.feelingPrefix">心情：</span>
            <span class="indicator__label" id="feeling-label">开心</span>
          </div>
        </div>
      </section>

      <section class="panel-card model-card">
        <div class="model-feed">
          <span class="model-feed__emoji" aria-hidden="true">🍰</span>
          <span data-i18n="sidebar.feeding">正在喂养：</span>
          <span class="model-feed__name" id="feeding-model">DeepSeek Chat</span>
        </div>
        <button type="button" class="model-switch-btn" id="open-chat-btn" title="打开聊天" data-i18n-title="sidebar.openChat">
          <span aria-hidden="true">💬</span>
          <span data-i18n="sidebar.openChat">打开聊天</span>
        </button>
        <button type="button" class="model-switch-btn" id="call-btn" title="语音通话" data-i18n-title="sidebar.voiceCall">
          <span aria-hidden="true">📞</span>
          <span data-i18n="sidebar.voiceCall">语音通话</span>
        </button>
        <button type="button" class="model-switch-btn" id="model-switch-btn" title="切换模型" data-i18n-title="sidebar.switchModel">
          <span aria-hidden="true">⇄</span>
          <span data-i18n="sidebar.switchModel">切换模型</span>
        </button>
      </section>

      <section class="panel-card action-card">
        <button type="button" class="settings-btn" id="settings-btn" title="打开设置" data-i18n-title="sidebar.openSettings">
          <span class="settings-btn__icon" aria-hidden="true">⚙</span>
          <span class="settings-btn__text" data-i18n="sidebar.settings">设置</span>
        </button>
      </section>

      <hr class="sidebar__divider" />

      <div class="sidebar__version">Columbina v0.2.0</div>
    </main>
  </div>
  <script type="module" src="./sidebar.ts"></script>
</body>
</html>
